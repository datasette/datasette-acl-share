[project]
name = "datasette-share"
version = "0.0.1a1"
description = "Reusable Google-Docs-style share dialog for Datasette (<datasette-share-dialog>)"
readme = "README.md"
authors = [{name = "Alex Garcia"}]
license = "Apache-2.0"
classifiers = ["Framework :: Datasette"]
requires-python = ">=3.10"
dependencies = [
    "datasette>=1.0a20",
    "datasette-vite>=0.0.1a4",
]

[dependency-groups]
dev = ["pytest", "pytest-asyncio"]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project.entry-points.datasette]
share = "datasette_share"

[project.urls]
Homepage = "https://github.com/datasette/datasette-share"
Changelog = "https://github.com/datasette/datasette-share/releases"
Issues = "https://github.com/datasette/datasette-share/issues"

[tool.setuptools.packages.find]
include = ["datasette_share"]

[tool.setuptools.package-data]
datasette_share = ["static/**/*", "manifest.json"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"
